<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" role="img" aria-label="Matte finish album">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EEEEF0"/>
      <stop offset="1" stop-color="#DFDFE2"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#141418" flood-opacity="0.20"/>
    </filter>
    <linearGradient id="tex" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#fff" stop-opacity="0.05"/>
  <stop offset="1" stop-color="#000" stop-opacity="0.05"/>
</linearGradient>
  </defs>
  <rect width="1024" height="576" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <!-- page block behind the cover for depth -->
    <rect x="372" y="94" width="300" height="400" rx="8" fill="#F6F6F4"/>
    <rect x="664" y="102" width="8" height="384" rx="3" fill="#E7E7E2"/>
    <!-- cover -->
    <rect x="362" y="88" width="300" height="400" rx="10" fill="#9A9AA0"/>
    <rect x="362" y="88" width="300" height="400" rx="10" fill="url(#tex)"/>
    <!-- spine -->
    <rect x="362" y="88" width="26" height="400" rx="8" fill="#000000" opacity="0.08"/>
    <!-- front plate / debossed window -->
    <rect x="434" y="238" width="156" height="100" rx="4" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
    <line x1="466" y1="363" x2="558" y2="363" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
  </g>
</svg>
